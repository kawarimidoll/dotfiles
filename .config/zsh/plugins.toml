# Sheldon plugin configuration
# https://sheldon.cli.rs/Examples.html

shell = 'zsh'

[plugins.zsh-defer]
github = 'romkatv/zsh-defer'
hooks.post = '''
FPATH="$HOME/.docker/completions:$FPATH"

# zsh-defer は既定で各遅延タスク後に precmd フック(m)と reset-prompt(p) を毎回走らせる。
# starship(静的プロンプト)ではこれが無駄で、direnv フック再実行や starship 再描画が
# 遅延タスク数(約20)ぶん積み重なり、起動直後に約0.8秒 入力をブロックしていた(zprof 実測)。
# 以降の全 zsh-defer 呼び出しで m/p を無効化。s/z(autosuggest/highlight の無効化)は残す。
(( $+functions[_zsh-defer-orig] )) || functions[_zsh-defer-orig]=$functions[zsh-defer]
zsh-defer() { _zsh-defer-orig -mp "$@" }
zsh-defer autoload -Uz compinit
# -C: skip compaudit (fpath security scan, ~300ms every shell) and dump staleness
# check; load the existing dump as-is. After installing new completions, run
# `rm ~/.config/zsh/.zcompdump` (or `compinit` manually) to regenerate.
zsh-defer compinit -C
zsh-defer source $ZSHRC_DIR/lazy.zsh
'''

[templates]
defer = "{{ hooks?.pre | nl }}{% for file in files %}zsh-defer source \"{{ file }}\"\n{% endfor %}{{ hooks?.post | nl }}"

[plugins.zsh-autosuggestions]
github = "zsh-users/zsh-autosuggestions"
use = ['{{ name }}.zsh']
apply = ['defer']

[plugins.zsh-completions]
github = "zsh-users/zsh-completions"
apply = ['defer']

[plugins.zsh-history-substring-search]
github = "zsh-users/zsh-history-substring-search"
use = ['{{ name }}.zsh']
apply = ['defer']

[plugins.zsh-syntax-highlighting]
github = 'zdharma-continuum/fast-syntax-highlighting'
apply = ['defer']

[plugins.zsh-autopair]
github = 'hlissner/zsh-autopair'
apply = ['defer']
hooks.pre = '''
export AUTOPAIR_INHIBIT_INIT=1
'''
# remove space from AUTOPAIR_PAIRS to avoid conflict with zeno.zsh
hooks.post = '''
unset 'AUTOPAIR_PAIRS[ ]'
zsh-defer autopair-init
unset AUTOPAIR_INHIBIT_INIT
'''

[plugins.zeno]
github = 'yuki-yano/zeno.zsh'
use = ['zeno.zsh']
apply = ['defer']

[plugins.brew]
inline = '''
[[ $OSTYPE == darwin* ]] && eval_source /opt/homebrew/bin/brew shellenv
'''

[plugins.starship]
inline = '''
eval_source starship init zsh
'''

[plugins.direnv]
inline = '''
eval_source direnv hook zsh
'''

# intelli-shell is currently disabled in nix (see nix/home-manager)
# [plugins.intelli-shell]
# inline = '''
# export INTELLI_SEARCH_HOTKEY='\es'
# export INTELLI_BOOKMARK_HOTKEY='\ek'
# export INTELLI_VARIABLE_HOTKEY='\ev'
# export INTELLI_FIX_HOTKEY='\er'
# zsh-defer eval_source intelli-shell init zsh
# '''

[plugins.fzf]
inline = '''
export FZF_COMPLETION_TRIGGER=',,'
# default options
export FZF_DEFAULT_COMMAND='fd --type f --hidden --exclude '.git/''
export FZF_DEFAULT_OPTS='--height=40% --reverse --border'
# file widget
export FZF_CTRL_T_COMMAND='fffe -f'
export FZF_CTRL_T_OPTS="--preview 'bat --line-range :30 {}'"
# change dir widget
export FZF_ALT_C_COMMAND='fd --type d'
export FZF_ALT_C_OPTS="--preview 'tree {} | head -30'"
# history widget
export FZF_CTRL_R_OPTS='--reverse'
# initialize
eval_source fzf --zsh
'''

[plugins.zmx]
# zmx completions は #compdef 形式(末尾で compdef 自己登録)。compinit 後が必要なため
# zsh-defer で遅延。eval_source で出力をキャッシュ+zcompile して読み込む。
inline = '''
zsh-defer eval_source zmx completions zsh
'''

[plugins.by-binds-yourself]
github = 'atusy/by-binds-yourself'
use = ['by.zsh']
apply = ['defer']

[plugins.ha]
# local = '/Users/kawarimidoll/ghq/github.com/kawarimidoll/ha'
github = 'kawarimidoll/ha'
use = ['ha.sh']
apply = ['defer']
hooks.post = '''
zsh-defer compdef _ha ha
'''

[plugins.tirith]
# accept-line/bracketed-paste ウィジェットを上書きして
# コマンド実行・ペースト前に危険な URL・パイプを検査する。
# 他のbracketed-pasteを再ラップするプラグインより「後」にロードしないと、
# tirithのウィジェットがorphan化し、"No such widget" 警告が出る。
# そのため全プラグインの末尾に置き、遅延キューの最後尾で読む。
inline = '''
command -v tirith >/dev/null && zsh-defer eval_source tirith init --shell zsh
'''
